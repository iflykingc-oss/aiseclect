name: aiseclect

on:
  # 每 4 小时一次（UTC），对应北京时间 0/4/8/12/16/20 点
  schedule:
    - cron: '17 */4 * * *'
  # 手动触发（Actions 页面点 Run workflow）
  workflow_dispatch:
    inputs:
      max_per_source:
        description: '每个采集源最大条数'
        required: false
        default: '10'
        type: string
      min_heat_score:
        description: '最低热度分（低于此分不进推文）'
        required: false
        default: '40'
        type: string
      clear_dedup:
        description: '清空历史去重（慎用）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      cleanup_pending:
        description: '先删除飞书表格中处理状态=待审核的旧记录（慎用）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

# 防止并发跑（比如上一次还没结束）
concurrency:
  group: aiseclect
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: 'uv.lock'

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Syntax check
        run: .venv/bin/python -m compileall src

      - name: Run workflow
        env:
          # 飞书
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_PAGE_ID: ${{ secrets.FEISHU_PAGE_ID }}
          FEISHU_TABLE_ID: ${{ secrets.FEISHU_TABLE_ID }}
          FEISHU_DOMAIN: ${{ secrets.FEISHU_DOMAIN }}
          # LLM（火山方舟 Plan，默认）
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          # Tavily
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          # 飞书告警机器人（可选，不配则告警走 stdout）
          FEISHU_ALERT_WEBHOOK: ${{ secrets.FEISHU_ALERT_WEBHOOK }}
          # GitHub（可选）
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 行为参数（手动触发时可覆盖）
          AISECLECT_MAX_PER_SOURCE: ${{ github.event.inputs.max_per_source || '10' }}
          AISECLECT_MIN_HEAT_SCORE: ${{ github.event.inputs.min_heat_score || '30' }}
          AISECLECT_CLEAR_DEDUP: ${{ github.event.inputs.clear_dedup || 'false' }}
          AISECLECT_CLEANUP_PENDING: ${{ github.event.inputs.cleanup_pending || 'false' }}
        run: |
          set -euo pipefail
          if [ "${AISECLECT_CLEANUP_PENDING}" = "true" ]; then
            echo "Cleaning Feishu pending records before run"
            .venv/bin/python scripts/cleanup_feishu_pending.py --confirm
          fi
          ARGS="--max-per-source ${AISECLECT_MAX_PER_SOURCE} --min-heat-score ${AISECLECT_MIN_HEAT_SCORE}"
          if [ "${AISECLECT_CLEAR_DEDUP}" = "true" ]; then
            ARGS="${ARGS} --clear-dedup"
          fi
          echo "Running: python -m src.main ${ARGS}"
          .venv/bin/python -m src.main ${ARGS}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tweets-${{ github.run_id }}
          path: output/
          retention-days: 7
          if-no-files-found: ignore
